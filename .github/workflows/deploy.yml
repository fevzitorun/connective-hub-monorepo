name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Deploy API to Railway ────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd apps/api
          railway up --service 7fil-api --detach

  # ─── Deploy Web to Vercel ─────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Web to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          pnpm --filter @7fil/web exec vercel --prod --token $VERCEL_TOKEN \
            --scope $VERCEL_ORG_ID

  # ─── Deploy Partner Portal to Vercel ─────────────────────────────────────────
  deploy-partner:
    name: Deploy Partner Portal (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Partner Portal to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PARTNER }}
        run: |
          pnpm --filter @7fil/partner-portal exec vercel --prod --token $VERCEL_TOKEN \
            --scope $VERCEL_ORG_ID

  # ─── EAS Build (Mobile) ───────────────────────────────────────────────────────
  eas-build:
    name: EAS Build (Mobile)
    runs-on: ubuntu-latest
    environment: production
    if: contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Build (Android + iOS)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform all --profile production --non-interactive
